<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <div id="navbar">
        <nav class="navbar" style="background-color: #D9D9D9;">
            <div class="container-fluid">
                <!-- Botão que ativa o offcanvas -->
                <button class="btn" style="background-color: #223146; color: white" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBothOptions" aria-controls="offcanvasWithBothOptions">
                    <span class="navbar-toggler-icon" style="filter: brightness(0) invert(1);" ></span>
                </button>

                <!-- Offcanvas fora do botão -->
                <div class="offcanvas offcanvas-start" data-bs-scroll="true" tabindex="-1" id="offcanvasWithBothOptions" aria-labelledby="offcanvasWithBothOptionsLabel">
                    <div class="offcanvas-header" style="background-color: #223146;">
                        <h5 class="offcanvas-title text-light" id="offcanvasWithBothOptionsLabel">Menu</h5>
                        <button type="button"  class="btn-close" style="filter: brightness(0) invert(1);"  data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <div class="d-flex flex-column align-items-center gap-2 pc-1 ">
                            <button onclick="home()" class="btn w-100 py-4" style="border-color: #223146;">Pagina principal</button>
                            <button onclick="perfil()" class="btn w-100 py-4" style="border-color: #223146;">Emprestimos</button>
                            <button onclick="listaL()" class="btn w-100 py-4" style="border-color: #223146;">Listar livros</button>
                            <button onclick="addL()" class="btn w-100 py-4" style="border-color: #223146;">Adicionar Livros</button>
                        </div>
                        <div class="mt-4 text-center" style="display: inline;">
                            <button class="btn btn-danger mb-2">Sair</button>
                            <button onclick="config()" class="btn btn-danger mb-2">Configurações</button>
                        </div>
                        
                    </div>
                </div>

                <!-- Barra de pesquisa -->
                <form onsubmit="pesquisarLivros(event)" class="d-flex w-75" role="search">
                    <input id="barraPesquisa" type="search" class="form-control me-2" style="border-color: #223146;" placeholder="Pesquisar por título..." aria-label="search">
                    <button type="submit" class="btn" style="border-color: #223146;" id="btn">Pesquisar</button>
                </form>
            </div>
        </nav>
    </div>


    <div>
        <div id="pagebody" class="row g-3 justify-content-center">
            <!-- Produtos serão inseridos aqui -->
            <!-- carousel imagens -->
            <div id="img" class="carousel slide" ">
                <div id="carInside" class="carousel-inner" style="justify-content: center; display: flex; background-color: #BDBDBD;">
                    
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Próximo</span>
                </button>
            </div>
            <div class=" container align-content-center" style="height: 25vh; background-color: #223146;">
                <div class="row align-items-center">
                    <div id="nameBook" class="col-md-6">
                        
                    </div>
                    <div class="col-md-6 text-end">
                        <button class="btn rounded-5" style="background-color: #40F069;" data-bs-toggle="modal" data-bs-target="#emprestimoModal">
                            Pedir emprestado
                        </button>
                    </div>
                </div>
            </div>
            <div class=" d-grid container" style="background-color: #D9D9D9;">
                <div class="m-4 d-flex justify-content-center">
                    <div class="col-md-9 rounded-5 text-light p-5" style="background-color: #223146;">
                        <h3>Sinopse:</h3>
                        <div id="descri" class="overflow-auto" style="max-height: 40vh;">

                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <div class="modal fade" id="emprestimoModal" tabindex="-1" aria-labelledby="emprestimoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
    <!-- Aqui trocamos <div> por <form> para que o evento 'submit' funcione -->
            <form class="modal-content" id="formulario">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="emprestimoModalLabel">Escolher data de empréstimo</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <label for="dataEmprestimo" class="form-label">Selecione a data de empréstimo:</label>
                    <input type="date" id="dataEmprestimo" class="form-control" required>

                    <label for="dataDevolucao" class="form-label mt-3">Selecione a data de devolução:</label>
                    <input type="date" id="dataDevolucao" class="form-control" required>

        <!-- Aqui colocamos a mensagem de sucesso/erro -->
                    <p id="msg" class="text-center mt-3"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <!-- Este botão agora envia o formulário -->
                    <button type="submit" class="btn btn-primary">Confirmar</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="emprestimo.js"></script>
</body>
</html>
