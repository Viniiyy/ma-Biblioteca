<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body style="background-color: #bbbbbb;">
    <div  id="navbar">
        <nav class="navbar" style="background-color: #D9D9D9;">
            <div class="container-fluid">
                <button class="btn" style="background-color: #284d81;" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBothOptions">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasWithBothOptions">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title"></h5>
                    </div>
                    <div class="offcanvas-body">
                        <p>gulili</p>
                    </div>
                </div>

                <form class="d-flex w-75" role="search">
                    <input type="search" class="form-control me-2" style="border-color: #284d81;" placeholder="Pesquisar">
                    <button class="btn" style="border-color: #284d81;" type="submit">Pesquisar</button>
                </form>
            </div>
        </nav>
    </div>

    <div id="addlivro" class="container mt-4">
        <div class="card" style="background-color: #3F4A5A;">
            <div class="card-body">
                <form id="formLivro" enctype="multipart/form-data">
                    <div style="width: 70%;">
                        <div class="mb-3">
                            <input name="titulo" id="nlivro" type="text" class="form-control" placeholder="Nome do Livro" required>
                        </div>
                        <div class="mb-3">
                            <textarea name="descricao" class="form-control" id="descricao" rows="4" placeholder="Descrição" required></textarea>
                        </div>
                        <div class="mb-3">
                            <input name="situacao" id="situacao" type="text" class="form-control" placeholder="Situação *max 15 caracteres" required>
                        </div>
                    </div>
                    <div class="mb-3" style="width: 25%;">
                        <div class="card p-3" style="background-color: #f8f9fa;">
                            <label class="form-label mb-2">Imagem do Livro</label>
                            <input name="imagem" type="file" id="imagem" class="form-control" accept="image/*" required>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <input name="dataEntrada" type="date" id="data" class="form-control w-auto">
                        <select name="categoria" id="selct-categoria" class="form-select">
                            <option value="Aventura">Caregando...</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2 justify-content-start">
                        <button type="submit" class="btn" style="background-color: #BAC5CE;">Enviar</button>
                        <button type="button" class="btn" style="background-color: #D6ADAD;">Cancelar</button>
                    </div>
                </form>
                <p id="msg"></p>
            </div>
        </div>
    </div>
    <script src="editar.js"></script>
</body>
</html>
