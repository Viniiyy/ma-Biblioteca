<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <div id="navbar">
        <nav class="navbar" style="background-color: #D9D9D9;">
            <div class="container-fluid">
                <!-- Botão que ativa o offcanvas -->
                <button class="btn" style="background-color: #223146; color: white" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBothOptions" aria-controls="offcanvasWithBothOptions">
                    <span class="navbar-toggler-icon" style="filter: brightness(0) invert(1);" ></span>
                </button>

                <!-- Offcanvas fora do botão -->
                <div class="offcanvas offcanvas-start" data-bs-scroll="true" tabindex="-1" id="offcanvasWithBothOptions" aria-labelledby="offcanvasWithBothOptionsLabel">
                    <div class="offcanvas-header" style="background-color: #223146;">
                        <h5 class="offcanvas-title text-light" id="offcanvasWithBothOptionsLabel">Menu</h5>
                        <button type="button" style="filter: brightness(0) invert(1);"  class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <div class="d-flex flex-column align-items-center gap-2 pc-1 ">
                            <button onclick="home()" class="btn w-100 py-4" style="border-color: #223146;">Pagina principal</button>
                            <button onclick="perfil()" class="btn w-100 py-4" style="border-color: #223146;">Emprestimos</button>
                            <button onclick="listaL()" class="btn w-100 py-4" style="border-color: #223146;">Listar livros</button>
                            <button onclick="addL()" class="btn w-100 py-4" style="border-color: #223146;">Adicionar Livros</button>
                        </div>
                        <div class="mt-4 text-center" style="display: inline;">
                            <button class="btn btn-danger mb-2">Sair</button>
                            <button onclick="config()" class="btn btn-danger mb-2">Configurações</button>
                        </div>
                        
                    </div>
                </div>

                <!-- Barra de pesquisa -->
                <form onsubmit="pesquisarLivros(event)" class="d-flex w-75" role="search">
                    <input id="barraPesquisa" type="search" class="form-control me-2" style="border-color: #223146;" placeholder="Pesquisar por título..." aria-label="search">
                    <button type="submit" class="btn" style="border-color: #223146;" id="btn">Pesquisar</button>
                </form>
            </div>
        </nav>
    </div>

    <div>
        <div id="pagebody" class="row g-3 justify-content-center">
            <!-- Produtos serão inseridos aqui -->
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="homeFil.js"></script>
</body>
</html>
