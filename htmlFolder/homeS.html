<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <div id="navbar">
        <nav class="navbar" style="background-color: #D9D9D9;">
            <div class="container-fluid">
                <!-- Botão que ativa o offcanvas -->
                <button class="btn" style="background-color: #284d81; color: white" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBothOptions" aria-controls="offcanvasWithBothOptions">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <!-- Offcanvas fora do botão -->
                <div class="offcanvas offcanvas-start" data-bs-scroll="true" tabindex="-1" id="offcanvasWithBothOptions" aria-labelledby="offcanvasWithBothOptionsLabel">
                    <div class="offcanvas-header">
                        <h5 class="offcanvas-title" id="offcanvasWithBothOptionsLabel">Menu</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <p>gulili</p>
                    </div>
                </div>

                <!-- Barra de pesquisa -->
                <form action="" class="d-flex w-75" role="search">
                    <input type="search" class="form-control me-2" style="border-color: #284d81;" placeholder="Pesquisar" aria-label="search">
                    <button class="btn" style="border-color: #284d81;" type="submit" id="btn">Pesquisar</button>
                </form>
            </div>
        </nav>
    </div>

    <!-- Filtros -->
    <div>
        <div class="overflow-auto" style="white-space: nowrap; height: 3rem;">
            <div class="btn-toolbar">
                <div class="btn-group me-2" role="group" id="filter">
                    <!-- Botões de filtro serão inseridos aqui -->
                </div>
            </div>
        </div>
    </div>

    <div>
        <div id="pagebody" class="row g-3 justify-content-center">
            <!-- Produtos serão inseridos aqui -->
            
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="home.js"></script>
</body>
</html>
