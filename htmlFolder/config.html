<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body>
    <div id="navbar">
        <nav class="navbar" style="background-color: #D9D9D9;">
            <div class="container-fluid">
                <!-- Botão que ativa o offcanvas -->
                <button class="btn" style="background-color: #223146; color: white" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasWithBothOptions" aria-controls="offcanvasWithBothOptions">
                    <span class="navbar-toggler-icon" style="filter: brightness(0) invert(1);"></span>
                </button>

               

                <!-- Offcanvas fora do botão -->
                <div class="offcanvas offcanvas-start" data-bs-scroll="true" tabindex="-1" id="offcanvasWithBothOptions" aria-labelledby="offcanvasWithBothOptionsLabel">
                    <div class="offcanvas-header" style="background-color: #223146;">
                        <h5 class="offcanvas-title text-light" id="offcanvasWithBothOptionsLabel">Menu</h5>
                        <button type="button"  class="btn-close " style="filter: brightness(0) invert(1);" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <div class="d-flex flex-column align-items-center gap-2 pc-1 ">
                            <button onclick="homep()" class="btn w-100 py-4" style="border-color: #223146;">Pagina principal</button>
                            <button onclick="favoritos()" class="btn w-100 py-4" style="border-color: #223146;">Favoritados</button>
                            <button onclick="emprestimos()" class="btn w-100 py-4" style="border-color: #223146;">Emprestimos</button>
                            <button class="btn w-100 py-4" style="border-color: #223146;"></button>
                        </div>
                        <div class="mt-4 text-center" style="display: inline;">
                            <button class="btn btn-danger mb-2">Sair</button>
                            <button class="btn btn-danger mb-2">Config</button>
                        </div>
                    </div>
                    
                </div>
                <!-- Barra de pesquisa -->
                <form action="" class="d-flex w-75" role="search">
                    <input type="search" class="form-control me-2" style="border-color: #284d81;" placeholder="Pesquisar" aria-label="search">
                    <button class="btn" style="border-color: #284d81;" type="submit" id="btn">Pesquisar</button>
                </form>
            </div>
        </nav>
    </div>

    <div>
        <div id="pagebody" class="container mt-4">
            <div class="card" style="width: 100%; height: 100%;">
                <div class="card-body m-5">
                    <form id="formUser" enctype="multipart/form-data">
                        <div class="row">
                            <div id="nomeUser" class="col-md-6">
                                <!--Nome do usuario-->
                                
                            </div>
                            <div class="col-md-6">
                                <!--Imagem do Usuario-->
                                <input id="ImgUser" type="file" class="form-control" placeholder="Imagem do Usuario">
                            </div>
                        </div>
                        <div class="row mt-5">
                            <div id="MailUser" class="">
                                <!--Email do usuario-->
                                
                            </div>
                        </div>
                        <div class="row mt-5">
                            <div class="">
                                <!--botão de salvar-->
                                <button type="submit" class="btn btn-primary">Salvar</button>
                                <!--botão de cancelar-->
                                <button type="button" class="btn btn-danger">Cancelar</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="config.js"></script>
</body>
</html>


<div style="background-color: #D9D9D9;"></div>
